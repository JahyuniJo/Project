<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thống kê hệ thống</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-200 min-h-screen flex flex-col font-sans">
  <!-- HEADER -->
  <header class="bg-white shadow-md sticky top-0 z-50">
    <div class="ml-64">
      <div class="container mx-auto flex items-center justify-between py-4 px-6">
        <a class="flex items-center gap-2">
          <img src="/assets/images/Logo.png" alt="Logo" class="w-10 h-10 rounded-full">
          <span class="text-2xl font-bold text-indigo-600">DH.story Admin</span>
        </a>
        <div class="flex items-center gap-4">
          <span id="adminGreeting" class="text-gray-600 font-medium">Xin chào...</span>
          <button onclick="logout()" class="px-3 py-2 bg-red-100 hover:bg-red-200 rounded-lg text-red-600 font-semibold transition">
            <i class="fa-solid fa-right-from-bracket mr-1"></i> Đăng xuất
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg z-50 flex flex-col">
    <div class="h-16 flex items-center justify-center border-b">
      <span class="font-bold text-indigo-600 text-lg">Bảng điều khiển</span>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 text-gray-700 font-medium">
      <a href="/user.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">
        <i class="fa-solid fa-users"></i> Quản lý người dùng
      </a>
      <a href="/stat.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-indigo-100 text-indigo-700 font-semibold">
        <i class="fa-solid fa-chart-column"></i> Thống kê
      </a>
      <a href="/stories.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">
        <i class="fa-solid fa-book"></i> Quản lý truyện
      </a>
      <a href="/admin-report.html" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-indigo-50 hover:text-indigo-600">
        <i class="fa-solid fa-triangle-exclamation"></i> Quản lý báo lỗi
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 ml-64 px-8 py-8">
    <h2 class="text-3xl font-bold text-indigo-700 mb-8">Thống kê hệ thống</h2>

    <!-- Cards -->
    <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center">
        <div class="w-8 h-8 rounded-full border-4 border-indigo-300 border-t-indigo-600 animate-spin mb-4"></div>
        <p class="text-gray-400 text-sm">Đang tải...</p>
      </div>
    </div>

    <!-- Charts -->
    <h3 class="text-2xl font-bold text-indigo-700 mt-10 mb-4">Biểu đồ thống kê</h3>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Bar chart: Users & Stories -->
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h4 class="text-sm font-semibold text-gray-500 mb-4 uppercase tracking-wide">Người dùng &amp; Truyện</h4>
        <canvas id="usersStoriesChart" height="200"></canvas>
      </div>
      <!-- Gauge / Doughnut: Lượt đọc -->
      <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center">
        <h4 class="text-sm font-semibold text-gray-500 mb-4 uppercase tracking-wide w-full">Tổng lượt đọc</h4>
        <canvas id="viewsChart" height="200"></canvas>
        <p id="viewsLabel" class="mt-4 text-3xl font-bold text-yellow-600"></p>
      </div>
    </div>
  </main>

  <footer class="bg-white mt-auto shadow-inner ml-64">
    <div class="max-w-7xl mx-auto px-4 py-4 text-sm text-gray-500 text-center">
      © 2025 DH.story — Admin Panel
    </div>
  </footer>

  <script>
    let usersStoriesChart = null;
    let viewsChart = null;

    async function loadAdminName() {
      try {
        const res = await fetch('/api/import/me');
        if (!res.ok) return;
        const data = await res.json();
        const name = data.username || data.email || 'Admin';
        document.getElementById('adminGreeting').textContent = `Xin chào, ${name}`;
      } catch (_) {}
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stat');
        if (!res.ok) throw new Error('Lỗi API');
        const data = await res.json();

        // Render cards
        document.getElementById('statsContainer').innerHTML = `
          <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center">
            <i class="fa-solid fa-users text-4xl text-indigo-600 mb-3"></i>
            <h3 class="text-xl font-semibold">Người dùng</h3>
            <p class="text-3xl font-bold text-indigo-700">${data.totalUsers.toLocaleString()}</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center">
            <i class="fa-solid fa-book text-4xl text-green-600 mb-3"></i>
            <h3 class="text-xl font-semibold">Truyện</h3>
            <p class="text-3xl font-bold text-green-700">${data.totalStories.toLocaleString()}</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center justify-center">
            <i class="fa-solid fa-eye text-4xl text-yellow-500 mb-3"></i>
            <h3 class="text-xl font-semibold">Tổng lượt đọc</h3>
            <p class="text-3xl font-bold text-yellow-600">${data.totalViews.toLocaleString()}</p>
          </div>
        `;

        // Chart 1: Bar — Users & Stories (cùng đơn vị, scale hợp lý)
        const ctx1 = document.getElementById('usersStoriesChart').getContext('2d');
        if (usersStoriesChart) usersStoriesChart.destroy();
        usersStoriesChart = new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: ['Người dùng', 'Truyện'],
            datasets: [{
              label: 'Số lượng',
              data: [data.totalUsers, data.totalStories],
              backgroundColor: ['rgba(99,102,241,0.7)', 'rgba(34,197,94,0.7)'],
              borderColor: ['rgba(99,102,241,1)', 'rgba(34,197,94,1)'],
              borderWidth: 2,
              borderRadius: 8,
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
          }
        });

        // Chart 2: Doughnut — Lượt đọc hiển thị trực quan hơn bar
        const ctx2 = document.getElementById('viewsChart').getContext('2d');
        if (viewsChart) viewsChart.destroy();
        viewsChart = new Chart(ctx2, {
          type: 'doughnut',
          data: {
            labels: ['Lượt đọc'],
            datasets: [{
              data: [data.totalViews, 0],
              backgroundColor: ['rgba(234,179,8,0.8)', 'rgba(229,231,235,0.3)'],
              borderWidth: 0,
            }]
          },
          options: {
            responsive: true,
            cutout: '70%',
            plugins: {
              legend: { display: false },
              tooltip: { enabled: false }
            }
          }
        });

        document.getElementById('viewsLabel').textContent = data.totalViews.toLocaleString();

      } catch (err) {
        console.error('[stat.html] loadStats:', err);
        document.getElementById('statsContainer').innerHTML =
          '<p class="text-red-500 col-span-3 text-center">Không thể tải thống kê.</p>';
      }
    }

    function logout() {
      fetch('/api/users/logout').then(() => (window.location.href = '/'));
    }

    loadAdminName();
    loadStats();
  </script>
</body>
</html>
