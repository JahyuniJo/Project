<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách yêu thích | DH.story</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes ring {
      0%   { transform: rotate(0); }
      20%  { transform: rotate(-15deg); }
      40%  { transform: rotate(15deg); }
      60%  { transform: rotate(-10deg); }
      80%  { transform: rotate(10deg); }
      100% { transform: rotate(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e7ff 50%, #f0f0f0 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
    }
    .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <div id="app-header"></div>

  <!-- MAIN -->
  <main class="flex-grow container mx-auto py-10 px-6">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Quản lý danh sách yêu thích</h2>

      <!-- CREATE FORM -->
      <form id="createListForm" class="flex flex-col sm:flex-row gap-3 mb-8">
        <input type="text" id="listName" placeholder="Nhập tên danh sách (VD: Truyện ngôn tình)"
          class="flex-grow border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <button type="submit"
          class="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700 active:scale-95 transition">
          <i class="fa-solid fa-plus mr-1"></i> Tạo
        </button>
      </form>

      <!-- LIST CONTAINER -->
      <div id="favLists" class="space-y-4"></div>

      <!-- BACK -->
      <div class="mt-8 flex justify-center">
        <a href="info.html" class="px-4 py-2 bg-gray-200 text-indigo-700 rounded-xl hover:bg-gray-300 transition">
          <i class="fa-solid fa-user mr-1"></i> Cá nhân
        </a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-white border-t border-gray-200 mt-10">
    <div class="container mx-auto py-6 px-6 flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center gap-2 mb-4 md:mb-0">
        <img src="/assets/images/Logo.png" alt="Logo" class="w-8 h-8 rounded-full">
        <span class="font-bold text-indigo-600">DH.story</span>
      </div>
      <div class="text-center md:text-right text-xs text-gray-400">
        <p class="font-semibold text-gray-800 mb-1">LIÊN HỆ VỚI TÔI</p>
        <a href="https://github.com/JahyuniJo" target="_blank"
          class="flex items-center justify-center md:justify-end gap-2 hover:text-indigo-600">
          <span>Github</span>
          <img src="/assets/images/Github.jpg" alt="Github" class="w-5 h-5 rounded-full">
        </a>
        <p>Email: <a href="mailto:dieu300504@gmail.com" class="hover:text-indigo-600">dieu300504@gmail.com</a></p>
        <p class="mt-2">Copyright © 2025 DieuHoang</p>
      </div>
    </div>
  </footer>

  <script src="/components/alertModal.js"></script>
  <script>
    window.HEADER_CONFIG = { mode: 'simple', pageTitle: 'Danh sách yêu thích' };
  </script>
  <script src="/assets/js/header.js"></script>
  <script>

    // =============================
    // FAV LISTS
    // =============================
    const favListsEl = document.getElementById("favLists");
    const form       = document.getElementById("createListForm");
    const input      = document.getElementById("listName");

    // Inline rename state
    const isRenaming = {};

    function renderSkeletons() {
      favListsEl.innerHTML = [1, 2, 3].map(() => `
        <div class="rounded-xl border border-gray-100 px-5 py-4 space-y-2">
          <div class="flex justify-between items-center">
            <div class="skeleton h-5 rounded w-2/5"></div>
            <div class="skeleton h-5 rounded w-8"></div>
          </div>
        </div>
      `).join("");
    }

    function renderEmpty() {
      favListsEl.innerHTML = `
        <div class="flex flex-col items-center py-12 text-center">
          <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
            <i class="fa-regular fa-heart text-3xl text-indigo-400"></i>
          </div>
          <p class="text-gray-600 font-medium">Chưa có danh sách yêu thích nào</p>
          <p class="text-gray-400 text-sm mt-1 mb-4">Hãy tạo danh sách đầu tiên để lưu truyện!</p>
          <a href="/index2.html"
             class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition text-sm">
            <i class="fa-solid fa-magnifying-glass mr-1"></i> Khám phá truyện
          </a>
        </div>`;
    }

    async function loadFavLists() {
      renderSkeletons();
      try {
        const res = await fetch("/api/favlists", { credentials: "include" });
        if (!res.ok) throw new Error("Không thể tải danh sách");
        const lists = await res.json();

        favListsEl.innerHTML = "";
        if (!lists.length) { renderEmpty(); return; }

        lists.forEach(list => {
          const div = document.createElement("div");
          div.className = "bg-indigo-50 border border-indigo-100 rounded-xl px-5 py-4 shadow-sm hover:shadow-md transition";
          div.innerHTML = `
            <div class="flex justify-between items-center cursor-pointer select-none"
                 onclick="toggleList(${list.id})">
              <!-- Left: icon + name (editable) + badge -->
              <div class="flex items-center gap-2 min-w-0"
                   ondblclick="event.stopPropagation(); startRename(${list.id})">
                <i class="fa-solid fa-heart text-pink-500 flex-shrink-0"></i>
                <span id="name-text-${list.id}"
                      data-name="${list.name}"
                      class="font-semibold text-indigo-700 text-base truncate"
                      title="Nhấp đúp để đổi tên">
                  ${list.name}
                </span>
                <input id="name-input-${list.id}"
                       type="text"
                       class="hidden border-b-2 border-indigo-400 bg-transparent font-semibold text-indigo-700 text-base outline-none px-1 min-w-0 max-w-[180px]"
                       onkeydown="handleRenameKey(event, ${list.id})"
                       onblur="finishRename(${list.id})"
                       onclick="event.stopPropagation()">
                <span class="flex-shrink-0 text-xs text-indigo-500 bg-white border border-indigo-200 px-2 py-0.5 rounded-full">
                  ${list.story_count}
                </span>
              </div>
              <!-- Right: arrow + delete -->
              <div class="flex items-center gap-3 flex-shrink-0">
                <i id="arrow-${list.id}" class="fa-solid fa-chevron-down text-gray-400 transition-transform duration-200"></i>
                <button onclick="event.stopPropagation(); deleteList(${list.id})"
                        class="text-red-400 hover:text-red-600 transition">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
            <div id="stories-${list.id}" class="hidden mt-4"></div>`;
          favListsEl.appendChild(div);
        });
      } catch (err) {
        console.error("[fav] loadFavLists:", err);
        favListsEl.innerHTML = `<p class="text-red-500 text-center">Lỗi tải danh sách!</p>`;
      }
    }

    // ---- Inline rename ----
    function startRename(listId) {
      if (isRenaming[listId]) return;
      isRenaming[listId] = true;
      const nameEl  = document.getElementById(`name-text-${listId}`);
      const inputEl = document.getElementById(`name-input-${listId}`);
      inputEl.value = nameEl.dataset.name;
      nameEl.classList.add("hidden");
      inputEl.classList.remove("hidden");
      inputEl.focus();
      inputEl.select();
    }

    function handleRenameKey(e, listId) {
      e.stopPropagation();
      if (e.key === "Enter") { e.preventDefault(); document.getElementById(`name-input-${listId}`).blur(); }
      if (e.key === "Escape") cancelRename(listId);
    }

    function cancelRename(listId) {
      if (!isRenaming[listId]) return;
      isRenaming[listId] = false;
      document.getElementById(`name-text-${listId}`).classList.remove("hidden");
      document.getElementById(`name-input-${listId}`).classList.add("hidden");
    }

    async function finishRename(listId) {
      if (!isRenaming[listId]) return;
      isRenaming[listId] = false;
      const nameEl  = document.getElementById(`name-text-${listId}`);
      const inputEl = document.getElementById(`name-input-${listId}`);
      const newName = inputEl.value.trim();
      const oldName = nameEl.dataset.name;

      nameEl.classList.remove("hidden");
      inputEl.classList.add("hidden");

      if (!newName || newName === oldName) return;

      try {
        const res  = await fetch(`/api/favlists/${listId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ name: newName }),
        });
        const data = await res.json();
        if (res.ok) {
          nameEl.textContent = newName;
          nameEl.dataset.name = newName;
          showAlert("success", "Đã đổi tên danh sách!", "Thành công");
        } else {
          showAlert("error", data.message || "Không thể đổi tên!", "Lỗi");
        }
      } catch (err) {
        console.error("[fav] rename:", err);
        showAlert("error", "Lỗi kết nối server!", "Lỗi");
      }
    }

    // ---- Toggle expand / collapse ----
    async function toggleList(listId) {
      const container = document.getElementById(`stories-${listId}`);
      const arrow     = document.getElementById(`arrow-${listId}`);

      if (!container.classList.contains("hidden")) {
        container.classList.add("hidden");
        arrow.classList.remove("rotate-180");
        return;
      }

      document.querySelectorAll('[id^="stories-"]').forEach(el => el.classList.add("hidden"));
      document.querySelectorAll('[id^="arrow-"]').forEach(el => el.classList.remove("rotate-180"));

      container.classList.remove("hidden");
      arrow.classList.add("rotate-180");
      container.innerHTML = `
        <div class="flex justify-center py-6">
          <div class="animate-spin rounded-full h-7 w-7 border-2 border-indigo-400 border-t-transparent"></div>
        </div>`;

      try {
        const res = await fetch(`/api/favlists/${listId}/stories`, { credentials: "include" });
        if (!res.ok) throw new Error();
        const stories = await res.json();

        if (!stories.length) {
          container.innerHTML = `
            <p class="text-gray-400 text-sm text-center py-4">Danh sách này chưa có truyện nào.</p>`;
          return;
        }

        container.innerHTML = `
          <div class="stories-grid">
            ${stories.map(story => `
              <div class="relative group bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                <a href="/read2.html?id=${story.id}" class="block">
                  <div class="relative h-40 overflow-hidden bg-gray-100">
                    <img src="${story.cover_url || '/assets/images/Logo.png'}"
                         alt="${story.title}"
                         class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                         onerror="this.src='/assets/images/Logo.png'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
                  </div>
                  <p class="px-2 py-1.5 text-xs font-medium text-gray-800 line-clamp-2 leading-tight min-h-[2.5rem]">
                    ${story.title}
                  </p>
                </a>
                <button onclick="removeStoryFromList(${listId}, ${story.id})"
                        class="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center
                               opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-600 shadow-md"
                        title="Xóa khỏi danh sách">
                  <i class="fa-solid fa-xmark text-xs"></i>
                </button>
              </div>
            `).join("")}
          </div>`;
      } catch (err) {
        console.error("[fav] toggleList:", err);
        container.innerHTML = `<p class="text-red-500 text-sm text-center">Lỗi tải truyện!</p>`;
      }
    }

    // ---- Remove story from list ----
    async function removeStoryFromList(listId, storyId) {
      const ok = await showConfirm("Xóa truyện khỏi danh sách?", "Xác nhận");
      if (!ok) return;
      try {
        const res  = await fetch(`/api/favlists/${listId}/stories/${storyId}`, {
          method: "DELETE", credentials: "include",
        });
        const data = await res.json();
        if (!res.ok) return showAlert("error", data.message || "Không thể xóa truyện", "Lỗi");
        showAlert("success", "Đã xóa truyện khỏi danh sách!", "Thành công");
        await loadFavLists();
        toggleList(listId);
      } catch (err) {
        console.error("[fav] removeStory:", err);
        showAlert("error", "Lỗi kết nối server!", "Lỗi");
      }
    }

    // ---- Create new list ----
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = input.value.trim();
      if (!name) return showAlert("warning", "Vui lòng nhập tên danh sách!", "Cảnh báo");

      const btn = form.querySelector("button");
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Đang tạo...`;

      try {
        const res  = await fetch("/api/favlists", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (res.status === 400) {
          showAlert("warning", data.message || "Tên danh sách đã tồn tại", "Cảnh báo");
        } else if (!res.ok) {
          showAlert("error", data.message || "Không thể tạo danh sách!", "Lỗi");
        } else {
          showAlert("success", "Đã tạo danh sách yêu thích!", "Thành công");
          input.value = "";
          await loadFavLists();
        }
      } catch (err) {
        console.error("[fav] createList:", err);
        showAlert("error", "Lỗi kết nối server!", "Lỗi");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-plus mr-1"></i> Tạo`;
      }
    });

    // ---- Delete list ----
    async function deleteList(id) {
      const ok = await showConfirm("Bạn có chắc muốn xóa danh sách này?", "Xác nhận");
      if (!ok) return;
      try {
        const res  = await fetch(`/api/favlists/${id}`, { method: "DELETE", credentials: "include" });
        const data = await res.json();
        if (!res.ok) return showAlert("error", data.message || "Không thể xóa", "Lỗi");
        showAlert("success", "Đã xóa danh sách!", "Thành công");
        await loadFavLists();
      } catch (err) {
        console.error("[fav] deleteList:", err);
        showAlert("error", "Lỗi kết nối server!", "Lỗi");
      }
    }

    loadFavLists();
  </script>
</body>
</html>
