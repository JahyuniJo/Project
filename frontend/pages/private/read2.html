<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đọc truyện | DH.story</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.8s ease-in forwards;
    }

    .cover {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .cover:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .title-hover:hover {
      color: #4f46e5;
      text-shadow: 0 0 10px rgba(79, 70, 229, 0.2);
    }

    @keyframes ring {
      0% {
        transform: rotate(0);
      }

      20% {
        transform: rotate(-15deg);
      }

      40% {
        transform: rotate(15deg);
      }

      60% {
        transform: rotate(-10deg);
      }

      80% {
        transform: rotate(10deg);
      }

      100% {
        transform: rotate(0);
      }
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col font-sans">
  <div id="app-header"></div>



  <!-- MAIN -->
  <main class="flex-1 container mx-auto py-10 px-6 fade-in">
    <div id="story-container" class="bg-white shadow-lg rounded-2xl p-8 flex flex-col md:flex-row gap-8">

      <!-- Ảnh bìa -->
      <div class="flex-shrink-0 self-center">
        <img id="story-cover" src="" alt="Bìa truyện" class="w-56 h-80 object-cover rounded-xl cover" />
      </div>

      <!-- Nội dung truyện -->
      <div class="flex-1">
        <h1 id="story-title" class="text-2xl font-bold text-gray-800 mb-2 title-hover"></h1>
        <p id="story-rating" class="text-yellow-600 font-semibold mb-4"></p>
        <p id="story-author" class="text-gray-600 mb-4 italic"></p>
        <p id="story-genres" class="text-sm text-gray-500 mb-6"></p>
        <a id="story-link" href="#" target="_blank"
          class="inline-block bg-indigo-600 text-white font-semibold px-5 py-2 rounded-xl shadow-md hover:bg-indigo-700 transition duration-300 mb-6">
          📖 Đọc truyện gốc
        </a>
        <button id="favButton"
          class="inline-flex items-center gap-2 bg-pink-500 text-white font-semibold px-5 py-2 rounded-xl shadow-md hover:bg-pink-600 transition duration-300">
          <i class="fa-solid fa-heart"></i> Yêu thích
        </button>
        <button id="rateButton"
          class="inline-flex items-center gap-2 bg-yellow-500 text-white font-semibold px-5 py-2 rounded-xl shadow-md hover:bg-yellow-600 transition duration-300">
          <i class="fa-solid fa-star"></i> Đánh giá
        </button>

        <div id="story-content" class="leading-relaxed text-gray-800 text-justify whitespace-pre-line"></div>
      </div>
    </div>
    <!-- Danh sách chương -->
    <div class="bg-white shadow-lg rounded-2xl p-6 mt-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-book-open text-indigo-600"></i>
          Danh sách chương
          <span id="chapterCount" class="text-sm font-normal text-gray-400"></span>
        </h2>
      </div>

      <div id="chapterLoading" class="py-6 text-center">
        <div class="inline-block w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      </div>

      <p id="chapterEmpty" class="hidden py-6 text-center text-gray-400 text-sm">
        Chưa có chương nào được đồng bộ
      </p>

      <div id="chapterGrid" class="hidden grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2"></div>

      <div class="mt-3 text-center">
        <button id="chapterMoreBtn"
          class="hidden px-5 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm border border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 transition">
        </button>
      </div>
    </div>

    <!-- AI Summary Section -->
    <button id="aiSummaryBtn" class="mt-4 px-4 py-2 bg-indigo-500 text-white rounded-lg">
      🤖 Tóm tắt bằng AI
    </button>

    <div id="aiSummaryBox" class="hidden mt-3 p-4 bg-indigo-50 rounded-lg text-gray-800">
    </div>

    <!-- Truyện gợi ý -->
    <section class="mt-12">
      <div class="mt-10 bg-white p-6 rounded-xl shadow">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">
          📌 Gợi ý cho bạn
        </h3>
        <div id="recommendBox" class="space-y-3"></div>
      </div>

    </section>


    <!-- COMMENT SECTION -->
    <div class="mt-10 bg-white shadow-lg p-6 rounded-xl">

      <h2 class="text-xl font-bold text-gray-800 mb-4">💬 Bình luận</h2>

      <!-- Form comment -->
      <textarea id="commentInput" placeholder="Viết bình luận..."
        class="w-full border rounded-lg p-3 focus:ring focus:ring-indigo-300 outline-none"></textarea>

      <button id="sendComment" class="mt-3 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
        Gửi bình luận
      </button>

      <!-- Comment list -->
      <div id="commentList" class="mt-6 space-y-4"></div>
    </div>
  </main>


  <!--Modal danh sách yêu thích-->
  <div id="favModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
      <h2 class="text-lg font-semibold text-indigo-700 mb-4">Thêm truyện vào danh sách yêu thích</h2>
      <div id="favListContainer" class="space-y-3 mb-4 text-gray-700 text-sm">
        <p class="text-gray-500 italic">Đang tải danh sách...</p>
      </div>
      <div class="flex justify-between items-center gap-3">
        <input id="newListName" type="text" placeholder="Tạo danh sách mới..."
          class="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring focus:ring-indigo-300 outline-none">
        <button id="createListBtn" class="bg-indigo-500 text-white px-4 py-2 rounded-lg hover:bg-indigo-600 text-sm">
          Tạo
        </button>
      </div>
      <div class="flex justify-end mt-4">
        <button id="closeFavModal" class="text-gray-600 hover:text-gray-800 font-medium text-sm">Đóng</button>
      </div>
    </div>
  </div>

  <!--Modal đánh giá -->
  <div id="rateModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">

      <h2 class="text-lg font-semibold text-yellow-600 mb-4">Đánh giá truyện</h2>

      <div class="text-center mb-4">
        <div id="starSelect" class="flex justify-center gap-2 text-3xl text-gray-400 cursor-pointer">
          <i data-rate="1" class="fa-solid fa-star hover:text-yellow-400"></i>
          <i data-rate="2" class="fa-solid fa-star hover:text-yellow-400"></i>
          <i data-rate="3" class="fa-solid fa-star hover:text-yellow-400"></i>
          <i data-rate="4" class="fa-solid fa-star hover:text-yellow-400"></i>
          <i data-rate="5" class="fa-solid fa-star hover:text-yellow-400"></i>
        </div>
      </div>

      <div class="flex justify-end mt-4">
        <button id="submitRating" class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600">
          Gửi đánh giá
        </button>
        <button id="closeRateModal" class="ml-3 text-gray-600 hover:text-gray-800">
          Đóng
        </button>
      </div>

    </div>
  </div>


  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-10">
    <div class="container mx-auto py-6 px-6 flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center gap-2 mb-4 md:mb-0">
        <img src="/assets/images/Logo.png" alt="Logo" class="w-8 h-8 rounded-full">
        <span class="font-bold text-indigo-600">DH.story</span>
      </div>

      <div class="text-center md:text-right text-xs text-gray-400">
        <p class="font-semibold text-gray-800 mb-1">LIÊN HỆ VỚI TÔI</p>
        <a href="https://github.com/JahyuniJo" target="_blank"
          class="flex items-center justify-center md:justify-end gap-2 hover:text-indigo-600">
          <span>Github</span>
          <img src="/assets/images/Github.jpg" alt="Github" class="w-5 h-5 rounded-full">
        </a>
        <p>Email: <a href="mailto:dieu300504@gmail.com" class="hover:text-indigo-600">dieu300504@gmail.com</a></p>
        <p class="mt-2">© 2025 DieuHoang</p>
      </div>
    </div>
  </footer>
  <script src="/components/alertModal.js"></script>
  <script src="/assets/js/header.js"></script>
  <script src="/assets/js/comments.js"></script>
  <script>
    // AI summary
    document.getElementById("aiSummaryBtn").addEventListener("click", async () => {
      const storyId = getStoryId();
      const box = document.getElementById("aiSummaryBox");

      box.classList.remove("hidden");
      box.innerHTML = "⏳ Đang tạo tóm tắt bằng AI...";

      const res = await fetch("/api/ai/summarize", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ story_id: storyId })
      });

      const data = await res.json();
      box.innerHTML = data.summary;
    });


    async function loadRecommend() {
      const res = await fetch("/api/recommend", {
        credentials: "include"
      });
      const data = await res.json();

      const box = document.getElementById("recommendBox");
      box.innerHTML = data.map(story => `
    <a href="/read2.html?id=${story.id}"
       class="flex gap-3 hover:bg-indigo-50 p-2 rounded">
      <img src="${story.cover_url}" class="w-14 h-20 object-cover rounded">
      <div>
        <p class="font-semibold text-indigo-700">${story.title}</p>
        <p class="text-xs text-gray-500">${story.genres}</p>
        <p class="text-xs text-gray-500 italic">Lượt xem: ${story.view_count}</p>
        <p class="text-xs text-yellow-600">
  ⭐ ${story.avg_rating ? story.avg_rating.toFixed(1) : "Chưa có đánh giá"}
</p>

      </div>
    </a>
  `).join("");
    }


    const CHAPTER_INIT = 30;
    let allChaptersData = [];

    function renderChapterGrid(visibleCount) {
      const grid = document.getElementById("chapterGrid");
      const moreBtn = document.getElementById("chapterMoreBtn");
      const slice = allChaptersData.slice(0, visibleCount);

      grid.innerHTML = slice.map(ch =>
        `<a href="/chapter.html?id=${ch.id}&ref=read2"
            class="px-2 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs text-center hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 transition truncate block">
           Chương ${ch.chapter_num}
         </a>`
      ).join("");

      const remaining = allChaptersData.length - visibleCount;
      if (remaining > 0) {
        const nextCount = Math.min(visibleCount + CHAPTER_INIT, allChaptersData.length);
        moreBtn.textContent = "Xem thêm";
        moreBtn.classList.remove("hidden");
        moreBtn.onclick = () => renderChapterGrid(nextCount);
      } else {
        moreBtn.classList.add("hidden");
      }
    }

    async function loadChapters() {
      const id = getStoryId();
      if (!id) return;
      try {
        const res = await fetch(`/api/stories/${id}/chapters`);
        const chapters = await res.json();

        document.getElementById("chapterLoading").classList.add("hidden");

        if (!chapters.length) {
          document.getElementById("chapterEmpty").classList.remove("hidden");
          return;
        }

        allChaptersData = chapters;
        document.getElementById("chapterCount").textContent = `(${chapters.length} chương)`;
        document.getElementById("chapterGrid").classList.remove("hidden");
        renderChapterGrid(CHAPTER_INIT);
      } catch (err) {
        document.getElementById("chapterLoading").classList.add("hidden");
        console.error("[read2] tải chương:", err);
      }
    }

    const favBtn = document.getElementById("favButton");
    const favModal = document.getElementById("favModal");
    const favListContainer = document.getElementById("favListContainer");
    const newListInput = document.getElementById("newListName");
    const createListBtn = document.getElementById("createListBtn");
    const closeFavModal = document.getElementById("closeFavModal");
    // Lấy ID truyện hiện tại từ URL (?id=)
    function getStoryId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    // Mở modal chọn danh sách yêu thích
    favBtn.addEventListener("click", async () => {
      favModal.classList.remove("hidden");
      favListContainer.innerHTML = `<p class="text-gray-500 italic">Đang tải danh sách...</p>`;

      try {

        const res = await fetch("/api/favlists", {
          headers: { "Content-Type": "application/json", },
          credentials: "include",
        });
        if (!res.ok) throw new Error("Không thể tải danh sách");

        const lists = await res.json();

        if (lists.length === 0) {
          favListContainer.innerHTML = `<p class="text-gray-500 text-sm italic">Bạn chưa có danh sách nào. Hãy tạo mới ở dưới!</p>`;
        } else {
          favListContainer.innerHTML = lists.map(
            list => `
          <button onclick="addStoryToList(${list.id}, '${list.name.replace(/'/g, "\\'")}')"

                  class="block w-full text-left border border-gray-200 rounded-lg px-3 py-2 hover:bg-indigo-50 transition">
            <i class="fa-solid fa-heart text-pink-500 mr-2"></i>${list.name}
          </button>`
          ).join("");
        }
      } catch (err) {
        console.error(err);
        favListContainer.innerHTML = `<p class="text-red-500 text-sm">Lỗi tải danh sách!</p>`;
      }
    });

    // Đóng modal
    closeFavModal.addEventListener("click", () => favModal.classList.add("hidden"));

    // Tạo danh sách mới
    createListBtn.addEventListener("click", async () => {
      const name = newListInput.value.trim();
      if (!name) return showAlert("warning", "Vui lòng nhập tên danh sách!", "Cảnh báo");

      try {
        const res = await fetch("/api/favlists", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          credentials: "include",
          body: JSON.stringify({ name }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Không thể tạo danh sách");

        newListInput.value = "";
        showAlert("success", `Đã tạo danh sách "${name}"!`, "Thành công");
        favBtn.click(); // reload lại modal
      } catch (err) {
        alert("❌ " + err.message);
      }
    });

    // Thêm truyện vào danh sách
    async function addStoryToList(listId, listName) {
      const storyId = getStoryId();
      if (!storyId) return showAlert("error", "ID truyện không hợp lệ!", "Lỗi");

      try {
        const res = await fetch(`/api/favlists/${listId}/stories`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ storyId }),
        });

        const data = await res.json();
        if (res.ok) {
          showAlert("success", `Đã thêm truyện vào danh sách "${listName}"!`, "Thành công");
          favModal.classList.add("hidden");
        } else {
          showAlert("info", data.message || "Truyện đã có trong danh sách!", "Thông báo");
        }
      } catch (err) {
        console.error("❌ Lỗi thêm truyện:", err);
        alert("Lỗi kết nối server!");
      }
    }


    // Gọi API lấy chi tiết truyện
    let viewedOnce = false;

    async function loadStory() {
      const id = getStoryId();
      if (!id) return;

      try {
        // 1. Lấy chi tiết truyện
        const res = await fetch(`/api/stories/${id}`);
        if (!res.ok) throw new Error("Không tải được truyện");

        const story = await res.json();

        document.getElementById("story-cover").src = story.cover_url;
        document.getElementById("story-title").textContent = story.title;
        document.getElementById("story-author").textContent = "Tác giả: " + story.author;
        document.getElementById("story-genres").textContent = "Thể loại: " + story.genres;
        document.getElementById("story-content").textContent = story.description;

        const link = document.getElementById("story-link");
        link.href = story.url;
        if (!story.url) link.classList.add("hidden");

        // 2. Ghi log đọc (chỉ 1 lần / session)
        if (!viewedOnce) {
          viewedOnce = true;

          const viewRes = await fetch(`/api/stories/${id}/view`, {
            method: "POST",
            credentials: "include"
          });

          if (!viewRes.ok) {
            console.warn("Không ghi được log view");
          }
        }

        // 3. Load danh sách chương
        loadChapters();

        // 4. Load AI recommend (chỉ khi user login)
        if (window.HEADER_STATE?.loggedIn) {
          loadRecommend();
        }

      } catch (err) {
        console.error("Lỗi tải truyện:", err);
      }
    }
    loadStory();



    /* ==========================
       ⭐ RATING LOGIC
    ========================== */

    const rateBtn = document.getElementById("rateButton");
    const rateModal = document.getElementById("rateModal");
    const closeRateModal = document.getElementById("closeRateModal");
    const submitRating = document.getElementById("submitRating");
    const starSelect = document.getElementById("starSelect");

    let selectedRating = 0;

    // Mở modal
    rateBtn.addEventListener("click", () => {
      rateModal.classList.remove("hidden");
    });

    // Đóng modal
    closeRateModal.addEventListener("click", () => {
      rateModal.classList.add("hidden");
    });

    // Chọn sao
    starSelect.querySelectorAll("i").forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = star.dataset.rate;

        // Highlight sao
        starSelect.querySelectorAll("i").forEach(s => {
          s.classList.remove("text-yellow-400");
          if (s.dataset.rate <= selectedRating) s.classList.add("text-yellow-400");
        });
      });
    });

    // Gửi rating
    submitRating.addEventListener("click", async () => {
      if (selectedRating === 0)
        return showAlert("warning", "Vui lòng chọn số sao!", "Chưa chọn sao");

      const storyId = getStoryId();

      const res = await fetch("/api/rating", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ story_id: storyId, rating: selectedRating }),
      });

      const data = await res.json();

      if (res.ok) {
        showAlert("success", "Đánh giá thành công!", "Thành công");
        rateModal.classList.add("hidden");
        loadRating(); // refresh UI
      }
    });

    async function loadRating() {
      const id = getStoryId();
      const res = await fetch(`/api/rating?story_id=${id}`);
      const data = await res.json();

      document.getElementById("story-rating").innerHTML =
        `⭐ ${data.avg.toFixed(1)} / 5 (${data.total} đánh giá)`;
    }

    loadRating();

    initCommentSection({
      storyId: getStoryId,
      enableMenu: true,
      emptyMessage: "Chưa có bình luận nào"
    });

  </script>
</body>

</html>
