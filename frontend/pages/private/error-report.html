<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo lỗi | DH.story</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <div id="app-header"></div>

  <!-- MAIN -->
  <main class="flex-grow container mx-auto py-10 px-6">

    <!-- FORM CARD -->
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 p-8 relative overflow-hidden">
      <div class="absolute -top-16 -right-16 w-40 h-40 bg-gradient-to-tr from-indigo-300 to-purple-300 rounded-full opacity-30 blur-3xl"></div>
      <div class="relative z-10">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">Gửi báo lỗi đến hệ thống</h2>
        <p class="text-gray-500 text-center text-sm mb-6">
          Gặp trang lỗi, chapter không đọc được, nội dung sai, hay hình ảnh lỗi? Hãy báo cáo để chúng tôi xử lý nhanh nhất.
        </p>

        <form id="reportForm" class="flex flex-col gap-4">

          <!-- Loại lỗi -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Loại lỗi <span class="text-red-500">*</span></label>
            <select id="errorType"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white text-gray-700"
                    required>
              <option value="">-- Chọn loại lỗi --</option>
              <option value="display">Lỗi hiển thị / giao diện</option>
              <option value="chapter">Thiếu hoặc sai chapter</option>
              <option value="content">Nội dung sai / không đúng</option>
              <option value="image">Ảnh bìa / hình ảnh lỗi</option>
              <option value="crash">Trang bị crash / không load</option>
              <option value="other">Khác</option>
            </select>
          </div>

          <!-- Tên truyện -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tên truyện <span class="text-red-500">*</span></label>
            <input type="text" id="title" placeholder="Nhập tên truyện gặp lỗi"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300"
                   required>
          </div>

          <!-- Email (disabled, auto-fill) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email nhận phản hồi <span class="text-red-500">*</span></label>
            <input type="email" id="email" placeholder="Đang tải..."
                   class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50 text-gray-500 cursor-not-allowed"
                   disabled>
          </div>

          <!-- URL truyện -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">URL truyện (nếu có)</label>
            <input type="text" id="story" placeholder="https://..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300">
          </div>

          <!-- Mô tả lỗi + char counter -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Mô tả chi tiết lỗi <span class="text-red-500">*</span>
            </label>
            <textarea id="message" rows="5" maxlength="500"
                      placeholder="Mô tả chi tiết về lỗi bạn gặp phải..."
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"
                      required></textarea>
            <div class="flex justify-end mt-1">
              <span id="charCounter" class="text-xs text-gray-400">0 / 500</span>
            </div>
          </div>

          <!-- Screenshot upload + preview -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ảnh chụp màn hình (nếu có)</label>
            <label for="screenshot"
                   class="flex items-center gap-2 px-4 py-2 border-2 border-dashed border-indigo-300 rounded-lg cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition text-indigo-600 text-sm w-fit">
              <i class="fa-solid fa-image"></i>
              <span id="screenshotLabel">Chọn ảnh chụp màn hình</span>
            </label>
            <input type="file" id="screenshot" accept="image/*" class="hidden">
            <!-- Preview -->
            <div id="screenshotPreview" class="hidden mt-3">
              <div class="relative inline-block">
                <img id="screenshotImg" src="" alt="Preview"
                     class="max-h-40 max-w-full rounded-lg border border-gray-200 shadow-sm">
                <button type="button" id="removeScreenshot"
                        class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center hover:bg-red-600 shadow"
                        title="Xóa ảnh">
                  <i class="fa-solid fa-xmark text-xs"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" id="submitBtn"
                  class="px-4 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 active:scale-95 transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Gửi báo lỗi</span>
          </button>

        </form>
      </div>
    </div>

    <!-- REPORT HISTORY SECTION -->
    <div id="historySection" class="max-w-3xl mx-auto mt-8 hidden">
      <div class="bg-white rounded-2xl shadow-lg p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
          <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i>
          Báo lỗi trước đây của bạn
        </h3>
        <div id="reportsList">
          <div class="flex justify-center py-6">
            <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-400 border-t-transparent"></div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="bg-white border-t border-gray-200 mt-12">
    <div class="container mx-auto py-6 px-6 flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center gap-2 mb-4 md:mb-0">
        <img src="/assets/images/Logo.png" alt="Logo" class="w-8 h-8 rounded-full">
        <span class="font-bold text-indigo-600">DH.story</span>
      </div>
      <div class="text-center md:text-right text-xs text-gray-400">
        <p class="font-semibold text-gray-800 mb-1">LIÊN HỆ VỚI TÔI</p>
        <a href="https://github.com/JahyuniJo" target="_blank"
           class="flex items-center justify-center md:justify-end gap-2 hover:text-indigo-600">
          <span>Github</span>
          <img src="/assets/images/Github.jpg" alt="Github" class="w-5 h-5 rounded-full">
        </a>
        <p>Email: <a href="mailto:dieu300504@gmail.com" class="hover:text-indigo-600">dieu300504@gmail.com</a></p>
        <p class="mt-2">© 2025 DieuHoang. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/components/alertModal.js"></script>
  <script>
    window.HEADER_CONFIG = { mode: 'simple', pageTitle: 'Báo lỗi nội dung' };
  </script>
  <script src="/assets/js/header.js"></script>
  <script>
    // Điền email và load reports sau khi header xác thực xong
    (async () => {
      try {
        const res = await fetch("/api/import/me", { credentials: "include" });
        if (!res.ok) return;
        const user = await res.json();
        const emailInput = document.getElementById("email");
        if (emailInput) emailInput.value = user.email;
        loadMyReports();
      } catch (err) {
        console.error("[error-report] auth:", err);
      }
    })();

    // =============================
    // CHAR COUNTER
    // =============================
    const msgInput    = document.getElementById("message");
    const charCounter = document.getElementById("charCounter");

    msgInput.addEventListener("input", () => {
      const len = msgInput.value.length;
      charCounter.textContent = `${len} / 500`;
      charCounter.className = len > 450
        ? "text-xs text-red-500 font-medium"
        : "text-xs text-gray-400";
    });

    // =============================
    // SCREENSHOT PREVIEW
    // =============================
    const screenshotInput   = document.getElementById("screenshot");
    const screenshotPreview = document.getElementById("screenshotPreview");
    const screenshotImg     = document.getElementById("screenshotImg");
    const screenshotLabel   = document.getElementById("screenshotLabel");
    const removeBtn         = document.getElementById("removeScreenshot");

    screenshotInput.addEventListener("change", () => {
      const file = screenshotInput.files[0];
      if (!file) return;
      screenshotImg.src = URL.createObjectURL(file);
      screenshotLabel.textContent = file.name;
      screenshotPreview.classList.remove("hidden");
    });

    removeBtn.addEventListener("click", () => {
      screenshotInput.value = "";
      screenshotImg.src = "";
      screenshotLabel.textContent = "Chọn ảnh chụp màn hình";
      screenshotPreview.classList.add("hidden");
    });

    // =============================
    // SUBMIT FORM
    // =============================
    document.getElementById("reportForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const errorType = document.getElementById("errorType").value;
      const title     = document.getElementById("title").value.trim();
      const message   = document.getElementById("message").value.trim();

      if (!errorType) return showAlert("warning", "Vui lòng chọn loại lỗi!", "Cảnh báo");
      if (!title)     return showAlert("warning", "Vui lòng nhập tên truyện!", "Cảnh báo");
      if (!message)   return showAlert("warning", "Vui lòng mô tả lỗi bạn gặp!", "Cảnh báo");

      const btn  = document.getElementById("submitBtn");
      const span = btn.querySelector("span");
      const icon = btn.querySelector("i");
      btn.disabled = true;
      icon.className = "fa-solid fa-spinner fa-spin";
      span.textContent = "Đang gửi...";

      try {
        const formData = new FormData();
        formData.append("title",    `[${errorType}] ${title}`);
        formData.append("story",    document.getElementById("story").value.trim());
        formData.append("message",  message);
        formData.append("email",    userEmail);

        const screenshot = screenshotInput.files[0];
        if (screenshot) formData.append("screenshot", screenshot);

        const res  = await fetch("/api/report", { method: "POST", body: formData });
        const data = await res.json();

        if (res.ok) {
          showAlert("success", "Đã gửi báo lỗi thành công! Chúng tôi sẽ phản hồi qua email của bạn.", "Thành công");
          e.target.reset();
          charCounter.textContent = "0 / 500";
          screenshotPreview.classList.add("hidden");
          screenshotLabel.textContent = "Chọn ảnh chụp màn hình";
          loadMyReports();
        } else {
          showAlert("error", data.message || "Gửi báo lỗi thất bại. Vui lòng thử lại.", "Lỗi");
        }
      } catch (err) {
        console.error("[error-report] submit:", err);
        showAlert("error", "Lỗi kết nối server. Vui lòng thử lại.", "Lỗi");
      } finally {
        btn.disabled = false;
        icon.className = "fa-solid fa-paper-plane";
        span.textContent = "Gửi báo lỗi";
      }
    });

    // =============================
    // REPORT HISTORY
    // =============================
    function statusBadge(status) {
      const map = {
        pending:  { bg: "bg-yellow-100 text-yellow-700 border-yellow-300", label: "Chờ xử lý", icon: "fa-clock" },
        resolved: { bg: "bg-green-100 text-green-700 border-green-300",   label: "Đã xử lý",  icon: "fa-circle-check" },
        rejected: { bg: "bg-red-100 text-red-700 border-red-300",         label: "Từ chối",   icon: "fa-circle-xmark" },
      };
      const s = map[status] || { bg: "bg-gray-100 text-gray-600 border-gray-300", label: status, icon: "fa-circle" };
      return `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium border ${s.bg}">
        <i class="fa-solid ${s.icon}"></i> ${s.label}
      </span>`;
    }

    async function loadMyReports() {
      const section = document.getElementById("historySection");
      const list    = document.getElementById("reportsList");

      try {
        const res = await fetch("/api/reports/my", { credentials: "include" });
        if (!res.ok) return;
        const reports = await res.json();

        section.classList.remove("hidden");

        if (!reports.length) {
          list.innerHTML = `
            <div class="flex flex-col items-center py-8 text-center text-gray-400">
              <i class="fa-regular fa-folder-open text-3xl mb-2"></i>
              <p class="text-sm">Bạn chưa gửi báo lỗi nào.</p>
            </div>`;
          return;
        }

        list.innerHTML = reports.map(r => `
          <div class="border border-gray-100 rounded-xl p-4 mb-3 hover:shadow-sm transition bg-gray-50/50">
            <div class="flex justify-between items-start gap-3 flex-wrap">
              <div class="min-w-0">
                <p class="font-medium text-gray-800 truncate">${r.title}</p>
                <p class="text-xs text-gray-400 mt-0.5 flex items-center gap-1">
                  <i class="fa-regular fa-clock"></i>
                  ${new Date(r.created_at).toLocaleString("vi-VN")}
                </p>
              </div>
              ${statusBadge(r.status)}
            </div>
            <p class="text-sm text-gray-600 mt-2 line-clamp-2">${r.message}</p>
            ${r.story_url ? `
              <a href="${r.story_url}" target="_blank"
                 class="inline-flex items-center gap-1 text-xs text-indigo-500 hover:underline mt-1">
                <i class="fa-solid fa-link"></i> ${r.story_url}
              </a>` : ""}
            ${r.response ? `
              <div class="mt-3 bg-green-50 border border-green-200 rounded-lg p-3">
                <p class="text-xs font-semibold text-green-700 flex items-center gap-1 mb-1">
                  <i class="fa-solid fa-reply"></i> Phản hồi từ Admin
                </p>
                <p class="text-sm text-green-700">${r.response}</p>
              </div>` : ""}
          </div>
        `).join("");
      } catch (err) {
        console.error("[error-report] loadMyReports:", err);
      }
    }
  </script>

</body>
</html>
