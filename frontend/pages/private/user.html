<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý người dùng</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="ml-64">
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
        <a class="flex items-center gap-2">
          <img src="/assets/images/Logo.png" alt="Logo" class="w-8 h-8 rounded-full">
          <span class="font-bold text-indigo-600">DH.story Admin</span>
        </a>
        <div class="flex items-center gap-3">
          <span id="adminGreeting" class="text-sm text-gray-500">Xin chào...</span>
          <button onclick="logout()"
            class="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-medium transition">
            <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="fixed left-0 top-0 h-full w-64 bg-white border-r border-gray-200 z-50 flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <span class="font-bold text-indigo-600">Bảng điều khiển</span>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
      <a href="/user.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-semibold">
        <i class="fa-solid fa-users w-4"></i> Quản lý người dùng
      </a>
      <a href="/stat.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">
        <i class="fa-solid fa-chart-column w-4"></i> Thống kê
      </a>
      <a href="/stories.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">
        <i class="fa-solid fa-book w-4"></i> Quản lý truyện
      </a>
      <a href="/admin-report.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 transition">
        <i class="fa-solid fa-triangle-exclamation w-4"></i> Quản lý báo lỗi
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 ml-64 px-8 py-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
      <!-- Tiêu đề + nút thêm -->
      <div class="flex flex-col sm:flex-row justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 sm:mb-0">Quản lý người dùng</h2>
        <button id="btnAddUser"
          class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg shadow-md transition">
          <i class="fa fa-plus"></i>
          <span>Thêm người dùng</span>
        </button>
      </div>

      <!-- Thanh tìm kiếm + lọc role -->
      <div class="bg-white p-6 rounded-xl border border-gray-200 mb-6">
        <div class="flex flex-col md:flex-row items-center gap-4">
          <input id="searchInput" type="text" placeholder="Tìm kiếm theo tên hoặc email..."
            class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
          <select id="roleFilter"
            class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition text-sm text-gray-700">
            <option value="">Tất cả vai trò</option>
            <option value="user">Người dùng</option>
            <option value="admin">Quản trị viên</option>
          </select>
          <div class="flex gap-3">
            <button id="searchBtn"
              class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition font-medium">
              Tìm
            </button>
            <button id="refreshBtn"
              class="bg-gray-200 px-5 py-2 rounded-lg hover:bg-gray-300 transition font-medium">
              Làm mới
            </button>
          </div>
        </div>
      </div>

      <!-- Bảng người dùng -->
      <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-4">
        <table class="min-w-full border-collapse">
          <thead class="bg-indigo-50 text-indigo-700 text-sm uppercase font-semibold">
            <tr>
              <th class="py-3 px-4 text-left">ID</th>
              <th class="py-3 px-4 text-left">Tên người dùng</th>
              <th class="py-3 px-4 text-left">Email</th>
              <th class="py-3 px-4 text-left">Vai trò</th>
              <th class="py-3 px-4 text-left">Ngày đăng ký</th>
              <th class="py-3 px-4 text-center">Hành động</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="divide-y divide-gray-200 text-gray-700 text-sm"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between text-sm text-gray-500">
        <span id="paginationInfo"></span>
        <nav id="pagination" class="flex gap-2"></nav>
      </div>
    </div>
  </main>

  <!-- Modal Khóa tài khoản -->
  <div id="lockModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white w-96 p-6 rounded-lg shadow-lg">
      <h3 id="lockModalTitle" class="text-xl font-semibold mb-4 text-gray-800">Khóa tài khoản</h3>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Thời hạn khóa</label>
        <select id="lockDuration"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-400 text-sm">
          <option value="1">1 giờ</option>
          <option value="12">12 giờ</option>
          <option value="24" selected>1 ngày (24 giờ)</option>
          <option value="72">3 ngày</option>
          <option value="168">7 ngày</option>
          <option value="720">30 ngày</option>
        </select>
      </div>
      <div class="flex justify-end gap-3 mt-4">
        <button type="button" id="cancelLockModal"
          class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Hủy</button>
        <button type="button" id="confirmLockBtn"
          class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Xác nhận khóa</button>
      </div>
    </div>
  </div>

  <!-- Modal Thêm/Sửa -->
  <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white w-96 p-6 rounded-lg shadow-lg">
      <h3 id="modalTitle" class="text-xl font-semibold mb-4">Thêm người dùng</h3>
      <form id="userForm" class="flex flex-col gap-3">
        <input type="hidden" id="userId">
        <input id="username" type="text" placeholder="Tên người dùng"
          class="border px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
        <input id="email" type="email" placeholder="Email"
          class="border px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
        <div id="passwordField">
          <input id="password" type="password" placeholder="Mật khẩu"
            class="border px-3 py-2 rounded w-full focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <select id="role" class="border px-3 py-2 rounded focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="user">Người dùng</option>
          <option value="admin">Quản trị viên</option>
        </select>
        <div class="flex justify-end gap-3 mt-4">
          <button type="button" id="cancelModal"
            class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Hủy</button>
          <button type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="bg-white border-t border-gray-200 ml-64">
    <div class="max-w-7xl mx-auto px-6 py-4 text-xs text-gray-400 text-center">
      © 2025 DH.story — Admin Panel
    </div>
  </footer>

  <script src="/components/alertModal.js"></script>
  <script>
    const API_URL = '/api/usercontroll';
    const userTableBody = document.getElementById('userTableBody');
    const userModal = document.getElementById('userModal');
    const modalTitle = document.getElementById('modalTitle');
    const userForm = document.getElementById('userForm');
    const btnAddUser = document.getElementById('btnAddUser');
    const cancelModal = document.getElementById('cancelModal');
    const searchInput = document.getElementById('searchInput');
    const roleFilter = document.getElementById('roleFilter');
    const searchBtn = document.getElementById('searchBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const passwordField = document.getElementById('passwordField');

    let editingId = null;
    let currentPage = 1;
    let currentSearch = '';
    let currentRole = '';
    let currentAdminId = null;
    let lockingUserId = null;

    async function loadAdminName() {
      try {
        const res = await fetch('/api/import/me');
        if (!res.ok) return;
        const data = await res.json();
        currentAdminId = data.id;
        const name = data.username || data.email || 'Admin';
        document.getElementById('adminGreeting').textContent = `Xin chào, ${name}`;
      } catch (_) {}
    }

    async function loadUsers(page = 1, search = '', role = '') {
      currentPage = page;
      currentSearch = search;
      currentRole = role;
      try {
        const params = new URLSearchParams({ page, limit: 10, search });
        if (role) params.set('role', role);
        const res = await fetch(`${API_URL}?${params}`);
        const data = await res.json();
        renderTable(data.users || []);
        renderPagination(data.page, data.totalPages, data.total);
      } catch (err) {
        console.error('[user.html] loadUsers:', err);
      }
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('vi-VN', {
        day: '2-digit', month: '2-digit', year: 'numeric'
      });
    }

    function formatLockedDisplay(iso) {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function isLocked(locked_until) {
      return locked_until && new Date(locked_until) > new Date();
    }

    function renderTable(users) {
      if (users.length === 0) {
        userTableBody.innerHTML =
          '<tr><td colspan="6" class="py-8 text-center text-gray-400">Không tìm thấy người dùng nào.</td></tr>';
        return;
      }
      userTableBody.innerHTML = users.map(u => {
        const isSelf = u.id === currentAdminId;
        const locked = isLocked(u.locked_until);
        const lockBadge = locked
          ? `<span class="ml-1 px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-700" title="Khóa đến ${formatLockedDisplay(u.locked_until)}">🔒 đến ${formatLockedDisplay(u.locked_until)}</span>`
          : '';
        const lockBtn = locked
          ? `<button onclick="unlockUser(${u.id})" class="text-green-600 hover:text-green-800 mx-1" title="Mở khóa"><i class="fa fa-lock-open"></i></button>`
          : `<button onclick="openLockModal(${u.id}, '${escapeHtml(u.username)}')" class="text-orange-400 hover:text-orange-600 mx-1" title="Khóa tài khoản"><i class="fa fa-lock"></i></button>`;
        return `
          <tr>
            <td class="py-3 px-4">${u.id}</td>
            <td class="py-3 px-4">${escapeHtml(u.username)}</td>
            <td class="py-3 px-4">${escapeHtml(u.email)}</td>
            <td class="py-3 px-4">
              <span class="px-2 py-1 rounded text-xs font-medium
                ${u.role === 'admin' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">
                ${u.role === 'admin' ? 'Admin' : 'Người dùng'}
              </span>
              ${lockBadge}
            </td>
            <td class="py-3 px-4 text-gray-500">${formatDate(u.created_at)}</td>
            <td class="py-3 px-4 text-center whitespace-nowrap">
              <button
                data-id="${u.id}"
                data-username="${escapeHtml(u.username)}"
                data-email="${escapeHtml(u.email)}"
                data-role="${u.role}"
                onclick="openEdit(this)"
                class="text-blue-600 hover:text-blue-800 mx-1" title="Chỉnh sửa">
                <i class="fa fa-edit"></i>
              </button>
              ${isSelf ? '' : `
              ${lockBtn}
              <button onclick="deleteUser(${u.id})"
                class="text-red-600 hover:text-red-800 mx-1" title="Xóa">
                <i class="fa fa-trash"></i>
              </button>`}
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderPagination(page, totalPages, total) {
      document.getElementById('paginationInfo').textContent =
        `Tổng ${total} người dùng — Trang ${page}/${totalPages || 1}`;

      const nav = document.getElementById('pagination');
      nav.innerHTML = '';
      if (!totalPages || totalPages <= 1) return;

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '←';
      prevBtn.disabled = page <= 1;
      prevBtn.className = `px-3 py-1 rounded ${page <= 1 ? 'bg-gray-100 text-gray-400' : 'bg-gray-200 hover:bg-gray-300'}`;
      prevBtn.onclick = () => loadUsers(page - 1, currentSearch, currentRole);
      nav.appendChild(prevBtn);

      const maxButtons = 5;
      let start = Math.max(1, page - Math.floor(maxButtons / 2));
      let end = Math.min(totalPages, start + maxButtons - 1);
      if (end - start < maxButtons - 1) start = Math.max(1, end - maxButtons + 1);

      for (let i = start; i <= end; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `px-3 py-1 rounded ${i === page ? 'bg-indigo-600 text-white' : 'bg-gray-200 hover:bg-gray-300'}`;
        btn.onclick = () => loadUsers(i, currentSearch, currentRole);
        nav.appendChild(btn);
      }

      const nextBtn = document.createElement('button');
      nextBtn.textContent = '→';
      nextBtn.disabled = page >= totalPages;
      nextBtn.className = `px-3 py-1 rounded ${page >= totalPages ? 'bg-gray-100 text-gray-400' : 'bg-gray-200 hover:bg-gray-300'}`;
      nextBtn.onclick = () => loadUsers(page + 1, currentSearch, currentRole);
      nav.appendChild(nextBtn);
    }

    btnAddUser.onclick = () => {
      editingId = null;
      modalTitle.textContent = 'Thêm người dùng';
      userForm.reset();
      passwordField.classList.remove('hidden');
      userModal.classList.remove('hidden');
      userModal.classList.add('flex');
    };

    function openEdit(btn) {
      editingId = parseInt(btn.dataset.id);
      modalTitle.textContent = 'Chỉnh sửa người dùng';
      document.getElementById('userId').value = editingId;
      document.getElementById('username').value = btn.dataset.username;
      document.getElementById('email').value = btn.dataset.email;
      document.getElementById('role').value = btn.dataset.role;
      passwordField.classList.add('hidden');
      userModal.classList.remove('hidden');
      userModal.classList.add('flex');
    }

    async function deleteUser(id) {
      const ok = await showConfirm('Xác nhận xóa', 'Bạn có chắc chắn muốn xóa người dùng này?');
      if (!ok) return;
      try {
        const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (res.ok) {
          showAlert('success', 'Đã xóa người dùng', 'Thành công');
          loadUsers(currentPage, currentSearch, currentRole);
        } else {
          showAlert('error', data.message || 'Xóa thất bại');
        }
      } catch (err) {
        console.error('[user.html] deleteUser:', err);
      }
    }

    userForm.onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;

      if (!editingId) {
        if (!password) {
          showAlert('error', 'Vui lòng nhập mật khẩu khi tạo người dùng mới');
          return;
        }
        if (password.length < 6) {
          showAlert('error', 'Mật khẩu phải có ít nhất 6 ký tự');
          return;
        }
      }

      try {
        const body = { username, email, role };
        if (!editingId) body.password = password;

        const res = await fetch(editingId ? `${API_URL}/${editingId}` : API_URL, {
          method: editingId ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
          userModal.classList.add('hidden');
          userModal.classList.remove('flex');
          showAlert('success', editingId ? 'Đã cập nhật người dùng' : 'Đã thêm người dùng mới');
          loadUsers(currentPage, currentSearch, currentRole);
        } else {
          showAlert('error', data.message || 'Thao tác thất bại');
        }
      } catch (err) {
        console.error('[user.html] submit:', err);
      }
    };

    searchBtn.onclick = () => loadUsers(1, searchInput.value.trim(), roleFilter.value);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadUsers(1, searchInput.value.trim(), roleFilter.value);
    });
    roleFilter.addEventListener('change', () => loadUsers(1, searchInput.value.trim(), roleFilter.value));
    refreshBtn.onclick = () => {
      searchInput.value = '';
      roleFilter.value = '';
      loadUsers(1, '');
    };
    cancelModal.onclick = () => {
      userModal.classList.add('hidden');
      userModal.classList.remove('flex');
    };
    userModal.addEventListener('click', (e) => {
      if (e.target === userModal) {
        userModal.classList.add('hidden');
        userModal.classList.remove('flex');
      }
    });

    function logout() {
      fetch('/api/users/logout').then(() => (window.location.href = '/'));
    }

    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/[&<>"']/g, m =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]
      );
    }

    const lockModal = document.getElementById('lockModal');
    const lockModalTitle = document.getElementById('lockModalTitle');
    const lockDuration = document.getElementById('lockDuration');

    function openLockModal(id, username) {
      lockingUserId = id;
      lockModalTitle.textContent = `Khóa tài khoản: ${username}`;
      lockDuration.value = '24';
      lockModal.classList.remove('hidden');
      lockModal.classList.add('flex');
    }

    function closeLockModal() {
      lockModal.classList.add('hidden');
      lockModal.classList.remove('flex');
      lockingUserId = null;
    }

    document.getElementById('cancelLockModal').onclick = closeLockModal;
    lockModal.addEventListener('click', (e) => { if (e.target === lockModal) closeLockModal(); });

    document.getElementById('confirmLockBtn').onclick = async () => {
      if (!lockingUserId) return;
      const hours = parseInt(lockDuration.value);
      try {
        const res = await fetch(`${API_URL}/${lockingUserId}/lock`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ duration_hours: hours })
        });
        const data = await res.json();
        closeLockModal();
        if (res.ok) {
          showAlert('success', data.message || 'Khóa tài khoản thành công');
          loadUsers(currentPage, currentSearch, currentRole);
        } else {
          showAlert('error', data.message || 'Thao tác thất bại');
        }
      } catch (err) {
        console.error('[user.html] confirmLock:', err);
      }
    };

    async function unlockUser(id) {
      const ok = await showConfirm('Xác nhận mở khóa', 'Bạn có chắc muốn mở khóa tài khoản này?');
      if (!ok) return;
      try {
        const res = await fetch(`${API_URL}/${id}/lock`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ duration_hours: 0 })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('success', data.message || 'Mở khóa thành công');
          loadUsers(currentPage, currentSearch, currentRole);
        } else {
          showAlert('error', data.message || 'Thao tác thất bại');
        }
      } catch (err) {
        console.error('[user.html] unlockUser:', err);
      }
    }

    loadAdminName();
    loadUsers();
  </script>
</body>
</html>
