<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên Mật Khẩu | DH.story</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gray-50">
  <main class="flex-grow flex justify-center items-center px-4 py-8">
    <div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8 border border-gray-100">
      <h2 class="text-center text-2xl font-bold text-indigo-600 mb-2">Khôi phục mật khẩu</h2>
      <p class="text-center text-gray-500 text-sm mb-6">Nhập email đã đăng ký. Chúng tôi sẽ gửi mã xác nhận về hộp thư của bạn.</p>

      <form id="forgotForm" class="space-y-4" novalidate>
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="email">Email</label>
          <input type="email" id="email" placeholder="Nhập email đã đăng ký..." required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
        </div>

        <button type="submit" id="submitBtn"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-all disabled:opacity-60 disabled:cursor-not-allowed">
          Gửi mã xác nhận
        </button>
      </form>

      <div id="message" class="mt-4 text-center text-sm hidden"></div>

      <div class="mt-6 text-center">
        <a href="login.html" class="text-gray-500 text-sm hover:underline">← Quay lại đăng nhập</a>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 py-4 text-center text-xs text-gray-400">
    <p>© 2025 <span class="font-semibold text-indigo-600">DH.story</span></p>
  </footer>

  <script>
    const form = document.getElementById("forgotForm");
    const submitBtn = document.getElementById("submitBtn");
    const msgEl = document.getElementById("message");

    function showMsg(text, isError = false) {
      msgEl.textContent = text;
      msgEl.className = `mt-4 text-center text-sm font-medium ${isError ? "text-red-500" : "text-green-600"}`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      if (!email) {
        showMsg("Vui lòng nhập email", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Đang gửi...";

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg(data.message || "Gửi mã thất bại, vui lòng thử lại", true);
          return;
        }

        showMsg(data.message);
        // Chỉ redirect khi thành công
        setTimeout(() => {
          window.location.href = "reset-password.html?email=" + encodeURIComponent(email);
        }, 1500);
      } catch {
        showMsg("Lỗi kết nối, vui lòng thử lại", true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Gửi mã xác nhận";
      }
    });
  </script>
</body>
</html>
