<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt Lại Mật Khẩu | DH.story</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-blue-50 to-indigo-100">
  <main class="flex-grow flex justify-center items-center px-4 py-8">
    <div class="bg-white shadow-lg rounded-2xl w-full max-w-md p-8 border border-gray-100">
      <h2 class="text-center text-2xl font-bold text-indigo-600 mb-2">Đặt lại mật khẩu</h2>
      <p id="emailHint" class="text-center text-gray-500 text-sm mb-6"></p>

      <!-- Bước 1: Nhập OTP -->
      <div id="stepOtp">
        <form id="otpForm" class="space-y-4" novalidate>
          <div>
            <label class="block text-gray-700 font-medium mb-1" for="otp">Mã xác nhận (OTP)</label>
            <input type="text" id="otp" placeholder="Nhập mã 6 chữ số..." maxlength="6"
                   inputmode="numeric" pattern="[0-9]*"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none tracking-widest text-center text-lg font-mono">
          </div>

          <button type="submit" id="verifyBtn"
                  class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-all disabled:opacity-60 disabled:cursor-not-allowed">
            Xác nhận OTP
          </button>
        </form>

        <div class="mt-3 text-center">
          <button id="resendBtn" class="text-indigo-500 text-sm hover:underline disabled:opacity-50" disabled>
            Gửi lại mã (<span id="countdown">60</span>s)
          </button>
        </div>
      </div>

      <!-- Bước 2: Nhập mật khẩu mới (ẩn đến khi OTP hợp lệ) -->
      <div id="stepPassword" class="hidden">
        <div class="flex items-center gap-2 mb-4 p-3 bg-green-50 border border-green-200 rounded-lg">
          <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <span class="text-green-700 text-sm font-medium">OTP hợp lệ — vui lòng nhập mật khẩu mới</span>
        </div>

        <form id="passwordForm" class="space-y-4" novalidate>
          <div>
            <label class="block text-gray-700 font-medium mb-1" for="newPassword">Mật khẩu mới</label>
            <input type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-1" for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
          </div>

          <button type="submit" id="resetBtn"
                  class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-all disabled:opacity-60 disabled:cursor-not-allowed">
            Đặt lại mật khẩu
          </button>
        </form>
      </div>

      <div id="message" class="mt-4 text-center text-sm hidden"></div>

      <div class="mt-6 text-center">
        <a href="forgot-password.html" class="text-gray-500 text-sm hover:underline">← Gửi lại OTP</a>
        &nbsp;·&nbsp;
        <a href="login.html" class="text-gray-500 text-sm hover:underline">Đăng nhập</a>
      </div>
    </div>
  </main>

  <footer class="bg-white shadow-inner py-4 text-center text-gray-600 text-sm">
    <p>© 2025 <span class="font-semibold text-indigo-600">DH.story</span></p>
  </footer>

  <script>
    // ── Guard: phải có email trong URL ──
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    if (!email) {
      window.location.href = "forgot-password.html";
    } else {
      document.getElementById("emailHint").textContent =
        "Mã OTP đã được gửi đến: " + email;
    }

    // ── Helpers ──
    const msgEl = document.getElementById("message");

    function showMsg(text, isError = false) {
      msgEl.textContent = text;
      msgEl.className = `mt-4 text-center text-sm font-medium ${isError ? "text-red-500" : "text-green-600"}`;
    }

    // ── Countdown gửi lại ──
    let secondsLeft = 60;
    const countdownEl = document.getElementById("countdown");
    const resendBtn = document.getElementById("resendBtn");

    const timer = setInterval(() => {
      secondsLeft--;
      countdownEl.textContent = secondsLeft;
      if (secondsLeft <= 0) {
        clearInterval(timer);
        resendBtn.disabled = false;
        resendBtn.textContent = "Gửi lại mã";
      }
    }, 1000);

    resendBtn.addEventListener("click", async () => {
      resendBtn.disabled = true;
      try {
        await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        showMsg("Đã gửi lại mã OTP");
      } catch {
        showMsg("Lỗi kết nối, vui lòng thử lại", true);
        resendBtn.disabled = false;
      }
    });

    // ── Bước 1: Xác nhận OTP ──
    const otpInput = document.getElementById("otp");
    const verifyBtn = document.getElementById("verifyBtn");

    // Chỉ cho nhập số
    otpInput.addEventListener("input", () => {
      otpInput.value = otpInput.value.replace(/\D/g, "");
    });

    document.getElementById("otpForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const otp = otpInput.value.trim();

      if (otp.length !== 6) {
        showMsg("Mã OTP gồm đúng 6 chữ số", true);
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = "Đang xác nhận...";

      try {
        const res = await fetch("/api/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp }),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.message || "OTP không hợp lệ", true);
          return;
        }

        // OTP đúng → hiện form mật khẩu
        msgEl.className = "hidden";
        document.getElementById("stepOtp").classList.add("hidden");
        document.getElementById("stepPassword").classList.remove("hidden");
      } catch {
        showMsg("Lỗi kết nối, vui lòng thử lại", true);
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = "Xác nhận OTP";
      }
    });

    // ── Bước 2: Đặt lại mật khẩu ──
    const resetBtn = document.getElementById("resetBtn");

    document.getElementById("passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const otp = otpInput.value.trim();

      if (newPassword.length < 6) {
        showMsg("Mật khẩu phải có ít nhất 6 ký tự", true);
        return;
      }
      if (newPassword !== confirmPassword) {
        showMsg("Mật khẩu xác nhận không khớp", true);
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = "Đang xử lý...";

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp, newPassword }),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.message || "Đặt lại mật khẩu thất bại", true);
          return;
        }

        showMsg("Đặt lại mật khẩu thành công! Đang chuyển hướng...");
        setTimeout(() => (window.location.href = "login.html"), 1800);
      } catch {
        showMsg("Lỗi kết nối, vui lòng thử lại", true);
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Đặt lại mật khẩu";
      }
    });
  </script>
</body>
</html>
