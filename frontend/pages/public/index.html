<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DH.story - Web của Diệu Hoàng</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .description.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Card scroll-in animation */
    .story-card {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .story-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Hero banner slides — blurred background */
    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: blur(8px) brightness(0.35);
      transform: scale(1.07); /* tránh viền trắng khi blur */
    }
    .hero-slide.active {
      opacity: 1;
    }

    /* Ảnh bìa nét trong banner */
    #heroCoverImg {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* Hero dot indicators */
    .hero-dot {
      height: 8px;
      width: 8px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      transition: background 0.3s, width 0.3s;
    }
    .hero-dot.active {
      background: white;
      width: 24px;
      border-radius: 4px;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col font-sans">

  <!-- Header -->
  <header class="bg-white shadow-md">
    <div class="container mx-auto flex flex-col md:flex-row items-center justify-between py-4 px-6">

      <!-- Logo -->
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-2">
          <img src="/assets/images/Logo.png" alt="Logo" class="w-10 h-10 rounded-full">
          <span class="text-2xl font-bold text-indigo-600">DH.story</span>
        </a>
      </div>

      <!-- Slogan -->
      <p class="italic text-gray-500 text-sm md:text-base mt-2 md:mt-0">
        Chúc các bạn đọc truyện vui vẻ!
      </p>

      <!-- Search + Menu -->
      <div class="flex flex-col md:flex-row items-center gap-4 mt-4 md:mt-0">

        <!-- Search -->
        <div class="relative">
          <div class="flex items-center bg-gray-100 rounded-full overflow-hidden shadow-inner">
            <input id="searchBox" type="text" placeholder="Tìm kiếm truyện..."
              class="px-4 py-2 bg-transparent focus:outline-none w-48 md:w-64 text-gray-700">
            <button id="searchBtn" class="px-3 text-indigo-600 hover:text-indigo-800" aria-label="Tìm kiếm">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div id="searchSuggestions"
            class="absolute left-0 right-0 bg-white shadow-lg rounded-lg mt-1 hidden max-h-64 overflow-y-auto z-50 border border-gray-200">
          </div>
        </div>

        <!-- Navigation: Thể loại | Xếp hạng | Truyện mới -->
        <div class="flex items-center gap-2 flex-wrap">
          <!-- Thể loại dropdown -->
          <div class="relative" id="genreDropdownWrapper">
            <button id="genreBtn"
              class="flex items-center gap-1.5 px-4 py-2 bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition text-sm font-medium">
              <i class="fa-solid fa-layer-group"></i> Thể loại
              <i id="genreChevron" class="fa-solid fa-chevron-down text-xs" style="transition: transform 0.2s"></i>
            </button>
            <div id="genreDropdown"
              class="hidden absolute left-0 top-full mt-2 bg-white shadow-xl rounded-2xl border border-gray-100 z-50 w-96 max-h-80 overflow-y-auto">
              <div id="genreList" class="p-3 grid grid-cols-2 gap-1 text-sm">
                <p class="col-span-2 text-gray-400 italic px-2 py-1 text-xs">Đang tải...</p>
              </div>
            </div>
          </div>
          <!-- Xếp hạng -->
          <a href="?sort=rating" id="btnRating"
            class="flex items-center gap-1.5 px-4 py-2 bg-yellow-50 text-yellow-700 rounded-full hover:bg-yellow-100 transition text-sm font-medium whitespace-nowrap">
            <i class="fa-solid fa-star"></i> Xếp hạng
          </a>
          <!-- Truyện mới -->
          <a href="?sort=newest" id="btnNewest"
            class="flex items-center gap-1.5 px-4 py-2 bg-green-50 text-green-700 rounded-full hover:bg-green-100 transition text-sm font-medium whitespace-nowrap">
            <i class="fa-solid fa-clock-rotate-left"></i> Truyện mới
          </a>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 mt-4 md:mt-0">
        <a href="login.html" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
          Đăng nhập
        </a>
        <a href="register.html"
          class="px-4 py-2 bg-white text-indigo-600 border border-indigo-600 rounded-lg hover:bg-indigo-50 transition">
          Đăng ký
        </a>
      </div>
    </div>
  </header>

  <!-- Hero Banner (ẩn mặc định, hiện nếu có truyện hot) -->
  <section id="heroBanner" class="hidden container mx-auto px-6 pt-8">
    <div class="relative w-full h-[22rem] md:h-[28rem] rounded-2xl overflow-hidden shadow-2xl bg-gray-900">

      <!-- Slides container (blurred backgrounds) -->
      <div id="heroSlides" class="absolute inset-0"></div>

      <!-- Gradient overlay: đậm trái → nhạt dần sang phải -->
      <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-black/10 pointer-events-none"></div>

      <!-- Content: trái = text, phải = ảnh bìa nét -->
      <div id="heroContent" class="absolute inset-0 flex items-center px-8 md:px-14 gap-8 text-white">

        <!-- Left -->
        <div class="flex-1 flex flex-col justify-center min-w-0">
          <p id="heroViewCount" class="text-xs font-bold uppercase tracking-widest text-indigo-300 mb-3"></p>
          <h2 id="heroTitle" class="text-2xl md:text-4xl font-extrabold mb-3 drop-shadow leading-tight line-clamp-2"></h2>
          <p id="heroAuthor" class="text-sm text-gray-300 mb-6 italic"></p>
          <a id="heroLink" href="#"
            class="self-start px-6 py-3 bg-indigo-500 hover:bg-indigo-400 active:scale-95 text-white font-semibold rounded-xl shadow-lg transition text-sm">
            📖 Đọc ngay
          </a>
        </div>

        <!-- Right: ảnh bìa rõ nét -->
        <div class="hidden md:flex flex-shrink-0 items-center justify-end pr-4">
          <img id="heroCoverImg" src="" alt="Bìa truyện"
            class="h-64 md:h-80 w-auto max-w-[11rem] object-cover rounded-2xl shadow-2xl ring-2 ring-white/25">
        </div>
      </div>

      <!-- Prev / Next -->
      <button id="heroPrev"
        class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/65 text-white w-10 h-10 rounded-full flex items-center justify-center transition z-10">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <button id="heroNext"
        class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/65 text-white w-10 h-10 rounded-full flex items-center justify-center transition z-10">
        <i class="fa-solid fa-chevron-right"></i>
      </button>

      <!-- Dot indicators -->
      <div id="heroDots" class="absolute bottom-5 left-1/2 -translate-x-1/2 flex gap-2 z-10"></div>
    </div>
  </section>

  <!-- Nội dung chính -->
  <main class="flex-grow container mx-auto px-6 py-8">
    <div id="listHeader" class="flex items-center justify-between mb-6">
      <h2 id="listTitle" class="text-2xl font-bold text-indigo-700">Danh sách truyện</h2>
      <button id="resetGenreBtn" onclick="resetGenre()" class="hidden text-sm px-4 py-2 rounded-lg
                 border border-indigo-600 text-indigo-600 hover:bg-indigo-50 transition">
        ← Xem tất cả truyện
      </button>
    </div>

    <div id="story-list" class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4"></div>

    <div id="pagination" class="flex justify-center items-center mt-8 gap-2"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-white mt-10 shadow-inner">
    <div class="container mx-auto py-6 px-6 flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center gap-2 mb-4 md:mb-0">
        <img src="/assets/images/Logo.png" alt="Logo" class="w-8 h-8 rounded-full">
        <span class="font-bold text-indigo-600 text-lg">DH.story</span>
      </div>
      <div class="text-center md:text-right text-gray-600 text-sm">
        <p class="font-semibold text-gray-800 mb-1">LIÊN HỆ VỚI TÔI</p>
        <a href="https://github.com/JahyuniJo" target="_blank"
          class="flex items-center justify-center md:justify-end gap-2 hover:text-indigo-600">
          <span>Github</span>
          <img src="/assets/images/Github.jpg" alt="Github" class="w-5 h-5 rounded-full">
        </a>
        <p>Email: <a href="mailto:dieu300504@gmail.com" class="hover:text-indigo-600">dieu300504@gmail.com</a></p>
        <p class="mt-2 text-xs text-gray-400">Copyright © 2025 DieuHoang</p>
      </div>
    </div>
  </footer>

  <script>
    let currentPage = 1;
    const limit = 12;
    const params = new URLSearchParams(window.location.search);
    const currentGenre = params.get("genre");
    const currentSort = params.get("sort"); // 'rating' | 'newest'

    /* ===========================
       SKELETON LOADING
    =========================== */
    function showSkeletons(count = 12) {
      const container = document.getElementById("story-list");
      container.innerHTML = Array.from({ length: count }, () => `
        <div class="bg-white rounded-2xl shadow-md overflow-hidden animate-pulse">
          <div class="w-full h-56 bg-gray-200"></div>
          <div class="p-4 space-y-3">
            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            <div class="h-3 bg-gray-200 rounded w-1/2"></div>
            <div class="h-3 bg-gray-200 rounded w-full"></div>
            <div class="h-3 bg-gray-200 rounded w-5/6"></div>
            <div class="h-4 bg-gray-200 rounded w-1/3 mt-2"></div>
          </div>
        </div>
      `).join("");
    }

    /* ===========================
       INTERSECTION OBSERVER
    =========================== */
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          cardObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });

    function observeCards() {
      document.querySelectorAll(".story-card").forEach((card, i) => {
        card.style.transitionDelay = `${Math.min(i, 5) * 60}ms`;
        cardObserver.observe(card);
      });
    }

    /* ===========================
       LOAD STORIES
    =========================== */
    async function loadStories(page = 1, search = "") {
      try {
        currentPage = page;
        showSkeletons();

        let url = `/api/stories?page=${page}&limit=${limit}`;
        if (search) url += `&q=${encodeURIComponent(search)}`;
        if (currentGenre) {
          url = `/api/stories/by-genre?genre=${encodeURIComponent(currentGenre)}&page=${page}&limit=${limit}`;
        } else if (currentSort === "rating") {
          url = `/api/stories/top-rated?page=${page}&limit=${limit}`;
        } else if (currentSort === "newest") {
          url = `/api/stories/newest?page=${page}&limit=${limit}`;
        }

        const res = await fetch(url);
        const raw = await res.json();
        const data = Array.isArray(raw) ? { stories: raw, page: 1, totalPages: 1 } : raw;

        const container = document.getElementById("story-list");
        const title = document.getElementById("listTitle");
        const resetBtn = document.getElementById("resetGenreBtn");

        if (currentGenre) {
          title.textContent = `📚 Thể loại: ${currentGenre}`;
          resetBtn.classList.remove("hidden");
        } else if (currentSort === "rating") {
          title.textContent = "⭐ Xếp hạng cao nhất";
          resetBtn.classList.remove("hidden");
        } else if (currentSort === "newest") {
          title.textContent = "🆕 Truyện mới nhất";
          resetBtn.classList.remove("hidden");
        } else {
          title.textContent = "Danh sách truyện";
          resetBtn.classList.add("hidden");
        }

        const cards = await Promise.all(
          data.stories.map(async (story) => {
            const rRes = await fetch(`/api/rating?story_id=${story.id}`);
            const rating = await rRes.json();
            const isHot = story.view_count >= 100;

            return `
<div class="story-card bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative">
  ${isHot ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full z-10">🔥 HOT</span>` : ""}
  <a href="read.html?id=${story.id}">
    <img src="${story.cover_url || '/assets/images/Logo.png'}" class="w-full h-56 object-cover">
  </a>
  <div class="p-4">
    <a href="read.html?id=${story.id}">
      <h3 class="text-lg font-semibold text-indigo-700 mb-1 truncate hover:underline">${story.title}</h3>
    </a>
    <p class="text-sm text-gray-600">Tác giả: ${story.author || "Không rõ"}</p>
    <p class="text-xs text-gray-500 mb-2">Thể loại: ${(story.genres || []).join(", ")}</p>
    <p class="description collapsed text-sm text-gray-700 mb-2">${story.description || ""}</p>
    <button class="text-indigo-600 text-sm hover:underline" onclick="toggleDescription(this)">Xem thêm</button>
    <p class="text-yellow-600 font-semibold mt-2">⭐ ${rating.avg?.toFixed(1) || 0} / 5 (${rating.total || 0})</p>
    <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-eye"></i> ${story.view_count} lượt đọc</p>
  </div>
</div>`;
          })
        );

        container.innerHTML = cards.join("");
        observeCards();
        renderPagination(data.page, data.totalPages);
      } catch (err) {
        console.error("[index] Lỗi tải truyện:", err);
      }
    }

    function resetGenre() {
      history.replaceState(null, "", "/index.html");
      window.location.reload();
    }

    function toggleDescription(button) {
      const desc = button.previousElementSibling;
      if (desc.classList.contains('collapsed')) {
        desc.classList.remove('collapsed');
        button.textContent = "Thu gọn";
      } else {
        desc.classList.add('collapsed');
        button.textContent = "Xem thêm";
      }
    }

    function renderPagination(current, total) {
      const pagination = document.getElementById("pagination");
      let html = "";

      html += `<button ${current === 1 ? "disabled" : `onclick="loadStories(${current - 1})"`}
        class="px-3 py-1 text-sm rounded-lg ${current === 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white text-indigo-600 hover:bg-indigo-100'}">« Trước</button>`;

      const maxButtons = 5;
      const half = Math.floor(maxButtons / 2);
      let start = Math.max(1, current - half);
      let end = Math.min(total, current + half);
      if (end - start < maxButtons - 1) {
        if (start === 1) end = Math.min(total, start + maxButtons - 1);
        else if (end === total) start = Math.max(1, total - maxButtons + 1);
      }

      if (start > 1) {
        html += `<button onclick="loadStories(1)" class="px-3 py-1 text-sm rounded-lg bg-white hover:bg-indigo-100">1</button>`;
        if (start > 2) html += `<span class="px-2 text-gray-500">…</span>`;
      }

      for (let i = start; i <= end; i++) {
        html += `<button onclick="loadStories(${i})"
          class="px-3 py-1 text-sm rounded-lg ${i === current ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-600 hover:bg-indigo-100'}">${i}</button>`;
      }

      if (end < total) {
        if (end < total - 1) html += `<span class="px-2 text-gray-500">…</span>`;
        html += `<button onclick="loadStories(${total})" class="px-3 py-1 text-sm rounded-lg bg-white hover:bg-indigo-100">${total}</button>`;
      }

      html += `<button ${current === total ? "disabled" : `onclick="loadStories(${current + 1})"`}
        class="px-3 py-1 text-sm rounded-lg ${current === total ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white text-indigo-600 hover:bg-indigo-100'}">Sau »</button>`;

      pagination.innerHTML = `<div class="flex flex-wrap justify-center items-center gap-1 sm:gap-2">${html}</div>`;
    }

    /* ===========================
       HERO BANNER
    =========================== */
    let heroStories = [];
    let heroIndex = 0;
    let heroTimer = null;

    function renderHeroSlide(index) {
      const story = heroStories[index];
      if (!story) return;

      document.getElementById("heroTitle").textContent = story.title;
      document.getElementById("heroAuthor").textContent = "Tác giả: " + (story.author || "Không rõ");
      document.getElementById("heroViewCount").textContent =
        `🔥 ${story.view_count} lượt đọc tuần này`;
      document.getElementById("heroLink").href = `/read.html?id=${story.id}`;

      // Cập nhật ảnh bìa nét bên phải
      const coverImg = document.getElementById("heroCoverImg");
      if (coverImg) {
        coverImg.src = story.cover_url || "/assets/images/Logo.png";
        coverImg.alt = story.title;
      }

      // Chuyển slide background (blurred)
      document.querySelectorAll(".hero-slide").forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });

      // Cập nhật dots
      document.querySelectorAll(".hero-dot").forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
      });
    }

    function heroGoto(index) {
      heroIndex = (index + heroStories.length) % heroStories.length;
      renderHeroSlide(heroIndex);
    }

    async function loadHeroBanner() {
      try {
        const res = await fetch("/api/stat/popular-week");
        const stories = await res.json();
        if (!Array.isArray(stories) || stories.length === 0) return;

        heroStories = stories;
        const banner = document.getElementById("heroBanner");
        const slidesEl = document.getElementById("heroSlides");
        const dotsEl = document.getElementById("heroDots");

        // Tạo slide backgrounds
        slidesEl.innerHTML = stories.map((s, i) => `
          <div class="hero-slide ${i === 0 ? "active" : ""}"
               style="background: url('${s.cover_url || "/assets/images/Logo.png"}') center/cover no-repeat;">
          </div>
        `).join("");

        // Tạo dots
        dotsEl.innerHTML = stories.map((_, i) => `
          <div class="hero-dot ${i === 0 ? "active" : ""}" onclick="heroGoto(${i})"></div>
        `).join("");

        renderHeroSlide(0);
        banner.classList.remove("hidden");

        // Nút điều hướng
        document.getElementById("heroPrev").addEventListener("click", () => {
          clearInterval(heroTimer);
          heroGoto(heroIndex - 1);
          startHeroTimer();
        });
        document.getElementById("heroNext").addEventListener("click", () => {
          clearInterval(heroTimer);
          heroGoto(heroIndex + 1);
          startHeroTimer();
        });

        startHeroTimer();
      } catch (err) {
        console.error("[index] Lỗi tải hero banner:", err);
      }
    }

    function startHeroTimer() {
      heroTimer = setInterval(() => heroGoto(heroIndex + 1), 4000);
    }

    /* ===========================
       SEARCH
    =========================== */
    const searchBox = document.getElementById("searchBox");
    const searchBtn = document.getElementById("searchBtn");
    const suggestionBox = document.getElementById("searchSuggestions");
    let typingTimer;

    function debounce(func, delay) {
      clearTimeout(typingTimer);
      typingTimer = setTimeout(func, delay);
    }

    async function fetchSuggestions(q) {
      if (!q.trim()) {
        suggestionBox.classList.add("hidden");
        return;
      }
      try {
        const res = await fetch(`/api/stories/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!data.length) {
          suggestionBox.innerHTML = `<p class="p-3 text-gray-500 text-sm">Không tìm thấy...</p>`;
          suggestionBox.classList.remove("hidden");
          return;
        }

        suggestionBox.innerHTML = data.map(item => `
          <div onclick="openStory(${item.id})"
               class="flex items-center p-2 hover:bg-indigo-50 cursor-pointer">
            <img src="${item.cover_url || '/assets/images/Logo.png'}" class="w-10 h-14 object-cover rounded mr-3">
            <div>
              <p class="font-medium text-indigo-700">${item.title}</p>
              <p class="text-xs text-gray-500">${item.author || "Không rõ tác giả"}</p>
            </div>
          </div>
        `).join("");
        suggestionBox.classList.remove("hidden");
      } catch (err) {
        console.error("[index] Lỗi fetchSuggest:", err);
      }
    }

    window.openStory = function (id) {
      window.location.href = `/read.html?id=${id}`;
    };

    window.selectSuggestion = function (title) {
      searchBox.value = title;
      suggestionBox.classList.add("hidden");
      loadStories(1, title);
    };

    searchBox.addEventListener("input", () => debounce(() => fetchSuggestions(searchBox.value), 200));
    searchBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        suggestionBox.classList.add("hidden");
        loadStories(1, searchBox.value.trim());
      }
    });
    searchBtn.addEventListener("click", () => {
      suggestionBox.classList.add("hidden");
      loadStories(1, searchBox.value.trim());
    });
    document.addEventListener("click", (e) => {
      if (!searchBox.contains(e.target) && !suggestionBox.contains(e.target)) {
        suggestionBox.classList.add("hidden");
      }
    });

    /* ===========================
       GENRE DROPDOWN
    =========================== */
    async function loadGenreDropdown() {
      try {
        const res = await fetch("/api/stories/genres");
        const genres = await res.json();
        const list = document.getElementById("genreList");
        if (!genres.length) {
          list.innerHTML = `<p class="col-span-2 text-gray-400 italic px-2 py-1 text-xs">Chưa có thể loại</p>`;
          return;
        }
        list.innerHTML = genres.map(g => `
          <a href="?genre=${encodeURIComponent(g)}"
             class="px-3 py-1.5 rounded-lg hover:bg-indigo-50 hover:text-indigo-700 truncate cursor-pointer transition text-gray-700 text-sm">
            ${g}
          </a>
        `).join("");
      } catch (err) {
        console.error("[index] Lỗi tải thể loại:", err);
      }
    }

    (function setupGenreDropdown() {
      const btn = document.getElementById("genreBtn");
      const dropdown = document.getElementById("genreDropdown");
      const chevron = document.getElementById("genreChevron");
      let loaded = false;

      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const opening = dropdown.classList.contains("hidden");
        dropdown.classList.toggle("hidden");
        chevron.style.transform = opening ? "rotate(180deg)" : "";
        if (opening && !loaded) { loadGenreDropdown(); loaded = true; }
      });

      document.addEventListener("click", (e) => {
        if (!document.getElementById("genreDropdownWrapper").contains(e.target)) {
          dropdown.classList.add("hidden");
          chevron.style.transform = "";
        }
      });

      // Highlight active nav button
      if (currentGenre) {
        btn.classList.replace("bg-indigo-50", "bg-indigo-200");
        btn.classList.replace("text-indigo-700", "text-indigo-900");
      } else if (currentSort === "rating") {
        const r = document.getElementById("btnRating");
        r.classList.replace("bg-yellow-50", "bg-yellow-200");
        r.classList.replace("text-yellow-700", "text-yellow-900");
      } else if (currentSort === "newest") {
        const n = document.getElementById("btnNewest");
        n.classList.replace("bg-green-50", "bg-green-200");
        n.classList.replace("text-green-700", "text-green-900");
      }
    })();

    /* ===========================
       INIT
    =========================== */
    loadHeroBanner();
    loadStories(1);
  </script>
</body>

</html>
